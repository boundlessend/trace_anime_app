name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - name: Install create-dmg
        run: npm install -g create-dmg

      - name: Build DMG
        run: ./script/build_dmg.sh
        env:
          APP_VERSION: ${{ github.ref_name }}

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/TraceAnime.dmg --generate-notes
